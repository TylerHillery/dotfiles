[tools]
claude-code = "latest"

[bootstrap.packages]
# core
"brew:git" = "latest"
"brew:tmux" = "latest"
"brew:make" = "latest"
"brew:curl" = "latest"
"brew:wget" = "latest"
"brew:tree" = "latest"
"brew:telnet" = "latest"
"brew:openssl@3" = "latest"
"brew:llvm" = "latest"
"brew:cmake" = "latest"
"brew:ninja" = "latest"
"brew:ffmpeg" = "latest"
"brew:mas" = "latest"
"brew:scrcpy" = "latest"
"brew:btop" = "latest"

# DBs
"brew:libpq" = "latest"

# GUI casks and Mac App Store apps live in mac/Brewfile and are installed by the
# `bootstrap` task via `brew bundle`. mise's brew-cask provider can't install
# casks with binary/manpage/pkg artifacts (vscode, datagrip, orbstack, ...), so
# real Homebrew owns them. Homebrew is installed by the pre-packages hook below.

[bootstrap.hooks]
pre-packages = "bash mac/install-homebrew.sh"

[dotfiles]
"~/.config/mise/config.toml" = { source = "mise.toml", mode = "symlink" }
"~/.config/mise/config.macos.toml" = { source = "mise.macos.toml", mode = "symlink" }
"~/.gitconfig" = { source = "mac/gitconfig", mode = "symlink" }
"~/.zshrc" = { source = "mac/zshrc", mode = "symlink" }
"~/.tmux.conf" = { source = "shared/tmux.conf", mode = "symlink" }
"~/.config/atuin/config.toml" = { source = "mac/atuin_config.toml", mode = "symlink" }
"~/.config/ghostty/config" = { source = "mac/ghostty_config", mode = "symlink" }
"~/.config/ghostty/vim.ghostty" = { source = "mac/vim.ghostty", mode = "symlink" }
"~/Library/Application Support/Code/User/settings.json" = { source = "mac/vscode_settings.jsonc", mode = "symlink" }
"~/Library/Application Support/Code/User/keybindings.json" = { source = "mac/vscode_keybindings.jsonc", mode = "symlink" }
"~/.oh-my-zsh/custom/themes/tylerhillery.zsh-theme" = { source = "shared/zsh/tylerhillery.zsh-theme", mode = "symlink" }

[bootstrap.user]
login_shell = "/bin/zsh"

[bootstrap.macos.keyboard]
press_and_hold = false

[tasks."bootstrap:brew-bundle"]
description = "Install GUI casks and Mac App Store apps from mac/Brewfile"
# eval shellenv so brew is found on a fresh machine where /opt/homebrew/bin
# isn't on PATH yet (the pre-packages hook installs it in a separate process).
run = 'cd "${MISE_ORIGINAL_CWD:-$PWD}" && eval "$(/opt/homebrew/bin/brew shellenv)" && brew bundle --file mac/Brewfile'

[tasks.bootstrap]
description = "Run idempotent macOS setup that does not fit declarative bootstrap"
run = [
  'cd "${MISE_ORIGINAL_CWD:-$PWD}" && mise run bootstrap:oh-my-zsh',
  'cd "${MISE_ORIGINAL_CWD:-$PWD}" && mise run bootstrap:nvim',
  'cd "${MISE_ORIGINAL_CWD:-$PWD}" && mise run bootstrap:vscode-extensions',
  'cd "${MISE_ORIGINAL_CWD:-$PWD}" && mise run bootstrap:brew-bundle',
]
