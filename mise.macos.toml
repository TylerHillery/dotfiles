[dotfiles]
"~/.config/mise/config.toml" = { source = "mise.toml", mode = "symlink" }
"~/.config/mise/config.macos.toml" = { source = "mise.macos.toml", mode = "symlink" }
"~/.gitconfig" = { source = "mac/gitconfig", mode = "symlink" }
"~/.zshrc" = { source = "mac/zshrc", mode = "symlink" }
"~/.tmux.conf" = { source = "mac/tmux.conf", mode = "symlink" }
"~/.config/atuin/config.toml" = { source = "mac/atuin_config.toml", mode = "symlink" }
"~/.config/ghostty/config" = { source = "mac/ghostty_config", mode = "symlink" }
"~/.config/ghostty/vim.ghostty" = { source = "mac/vim.ghostty", mode = "symlink" }
"~/Library/Application Support/Code/User/settings.json" = { source = "mac/vscode_settings.jsonc", mode = "symlink" }
"~/Library/Application Support/Code/User/keybindings.json" = { source = "mac/vscode_keybindings.jsonc", mode = "symlink" }
"~/.oh-my-zsh/custom/themes/tylerhillery.zsh-theme" = { source = "shared/zsh/tylerhillery.zsh-theme", mode = "symlink" }

[bootstrap.user]
login_shell = "/bin/zsh"

[bootstrap.macos.keyboard]
press_and_hold = false

[tasks.bootstrap]
description = "Run idempotent macOS setup that does not fit declarative bootstrap"
run = [
  "mise run bootstrap:oh-my-zsh",
  "mise run bootstrap:nvim",
  "mise run bootstrap:vscode-extensions",
]
