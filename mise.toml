min_version = { soft = "2026.6.13" }

[tools]
# Core
jq = "latest"
direnv = "latest"

# Fast
prek = "latest"
ripgrep = "latest"
fd = "latest"
fzf = "latest"
bat = "latest"

# Personal
atuin = "latest"
delta = "latest"
neovim = "latest"
btop = { version = "latest", os = ["linux"] } # macOS: brew:btop (no aqua darwin build)
opencode = "latest"
"aqua:quarto-dev/quarto-cli" = "latest"

# Programming Languages
rust = "latest"
uv = "latest"
node = "latest"
java = "latest"
go = "latest"

# Formatters
shfmt = "latest"
prettier = { version = "latest", depends = ["node"] }
biome = "latest"

# DBs
duckdb = "latest"

# Vendor CLIs
gh = "latest"
pulumi = "latest"
aws-cli = { version = "latest", os = ["linux"] }
gcloud = { version = "latest", os = ["linux", "macos"] }


[settings]
idiomatic_version_file_enable_tools = ["python", "node"]
status.missing_tools = "never"

[settings.dotfiles]
default_mode = "symlink"

[tasks.status]
description = "Show bootstrap and dotfile status"
run = "mise bootstrap status"

[tasks."bootstrap:oh-my-zsh"]
description = "Install oh-my-zsh if missing"
run = 'cd "${MISE_ORIGINAL_CWD:-$PWD}" && bash shared/bootstrap/install-oh-my-zsh.sh'

[tasks."bootstrap:vscode-extensions"]
description = "Install shared VS Code extensions"
run = 'cd "${MISE_ORIGINAL_CWD:-$PWD}" && bash shared/bootstrap/install-vscode-extensions.sh shared/vscode/extensions.txt'

[tasks."bootstrap:nvim"]
description = "Install Neovim config if missing"
run = 'cd "${MISE_ORIGINAL_CWD:-$PWD}" && bash shared/bootstrap/install-neovim-config.sh'

[tasks."bootstrap:wsl-conf"]
description = "Apply WSL system config when running inside WSL"
run = 'cd "${MISE_ORIGINAL_CWD:-$PWD}" && bash linux/apply-wsl-conf.sh'

[tasks."bootstrap:win32yank"]
description = "Install win32yank for Neovim clipboard support in WSL"
run = 'cd "${MISE_ORIGINAL_CWD:-$PWD}" && bash linux/install-win32yank.sh'

[tasks."bootstrap:tailscale"]
description = "Install and start Tailscale on Linux"
run = 'cd "${MISE_ORIGINAL_CWD:-$PWD}" && bash linux/install-tailscale.sh'

[tasks."bootstrap:opencode-server"]
description = "Install and start the OpenCode user service"
run = 'cd "${MISE_ORIGINAL_CWD:-$PWD}" && bash linux/install-opencode-server.sh'
