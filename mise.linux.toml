[bootstrap.packages]
"apt:git" = "latest"
"apt:zsh" = "latest"
"apt:tmux" = "latest"
"apt:make" = "latest"
"apt:curl" = "latest"
"apt:wget" = "latest"
"apt:tree" = "latest"
"apt:ca-certificates" = "latest"
"apt:build-essential" = "latest"
"apt:clang" = "latest"
"apt:clangd" = "latest"
"apt:clang-format" = "latest"
"apt:clang-tools" = "latest"
"apt:clang-tidy" = "latest"
"apt:lld" = "latest"
"apt:lldb" = "latest"
"apt:llvm" = "latest"
"apt:qemu-system-riscv" = "latest"
"apt:pkg-config" = "latest"
"apt:libssl-dev" = "latest"
"apt:gdb" = "latest"
"apt:cmake" = "latest"
"apt:ninja-build" = "latest"
"apt:ffmpeg" = "latest"

[bootstrap.hooks.pre-packages]
run = "sudo apt-get update && sudo apt-get upgrade -y"

[bootstrap.hooks.post-packages]
run = "sudo apt-get autoremove --purge -y && sudo apt-get autoclean"

[dotfiles]
"~/.config/mise/config.toml" = { source = "mise.toml", mode = "symlink" }
"~/.config/mise/config.linux.toml" = { source = "mise.linux.toml", mode = "symlink" }
"~/.gitconfig" = { source = "linux/gitconfig", mode = "symlink" }
"~/.aws/config" = { source = "shared/aws/config", mode = "symlink" }
"~/.zshrc" = { source = "linux/zshrc", mode = "symlink" }
"~/.tmux.conf" = { source = "shared/tmux.conf", mode = "symlink" }
"~/.config/atuin/config.toml" = { source = "linux/atuin_config.toml", mode = "symlink" }
"~/.oh-my-zsh/custom/themes/tylerhillery.zsh-theme" = { source = "shared/zsh/tylerhillery.zsh-theme", mode = "symlink" }

[bootstrap.user]
login_shell = "/usr/bin/zsh"

[tasks.bootstrap]
description = "Run idempotent Linux setup that does not fit declarative bootstrap"
run = [
  'cd "${MISE_ORIGINAL_CWD:-$PWD}" && mise run bootstrap:oh-my-zsh',
  'cd "${MISE_ORIGINAL_CWD:-$PWD}" && mise run bootstrap:nvim',
  'cd "${MISE_ORIGINAL_CWD:-$PWD}" && mise run bootstrap:vscode-extensions',
  'cd "${MISE_ORIGINAL_CWD:-$PWD}" && mise run bootstrap:win32yank',
  'cd "${MISE_ORIGINAL_CWD:-$PWD}" && mise run bootstrap:wsl-conf',
]
